# JovensSTP Database Schema (PostgreSQL)

# User table synchronized with Firebase Auth
type User @table(key: "id") {
  id: String! @default(expr: "auth.uid") # Firebase Auth UID
  username: String! @col(dataType: "varchar(100)")
  displayName: String @col(dataType: "varchar(255)")
  photoURL: String @col(dataType: "varchar(512)")
  email: String! @col(dataType: "varchar(255)")
  isMentor: Boolean @default(value: false)
  isCompany: Boolean @default(value: false)
}

# Meeting table for scheduling JovensSTP Meet sessions
type Meeting @table {
  id: UUID! @default(expr: "uuidV4()")
  title: String! @col(dataType: "varchar(255)")
  description: String @col(dataType: "text")
  host: User! # Foreign key to User
  startTime: Timestamp!
  endTime: Timestamp
  callId: String! @col(dataType: "varchar(64)") # The Stream Video call ID
  status: String! @default(value: "scheduled") # scheduled, live, ended, cancelled
  createdAt: Timestamp! @default(expr: "request.time")
}

# Participant junction table for many-to-many relationship
type MeetingParticipant @table(key: ["meeting", "user"]) {
  meeting: Meeting!
  user: User!
  role: String! @default(value: "guest") # host, speaker, guest
  joinedAt: Timestamp
}

# Recording table to store historical data of meeting captures
type MeetingRecording @table {
  id: UUID! @default(expr: "uuidV4()")
  meeting: Meeting!
  recordedBy: User! # Who initiated the recording
  streamUrl: String! @col(dataType: "varchar(512)")
  fileSize: Int @col(dataType: "int")
  durationSeconds: Int @col(dataType: "int")
  createdAt: Timestamp! @default(expr: "request.time")
}
