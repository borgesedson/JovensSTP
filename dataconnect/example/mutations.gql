# Upsert (update or insert) a user's profile based on their auth.uid
mutation UpsertUser($username: String!, $displayName: String, $photoURL: String, $email: String!) @auth(level: USER) {
  user_upsert(data: { 
    id_expr: "auth.uid", 
    username: $username, 
    displayName: $displayName, 
    photoURL: $photoURL, 
    email: $email 
  })
}

# Create a new meeting instance
mutation CreateMeeting($title: String!, $description: String, $startTime: Timestamp!, $callId: String!) @auth(level: USER) {
  meeting_insert(data: {
    title: $title,
    description: $description,
    startTime: $startTime,
    callId: $callId,
    hostId_expr: "auth.uid",
    status: "scheduled"
  })
}

# Join a meeting as a participant
mutation JoinMeetingParticipant($meetingId: UUID!, $role: String!) @auth(level: USER) {
  meetingParticipant_upsert(data: {
    meetingId: $meetingId,
    userId_expr: "auth.uid",
    role: $role,
    joinedAt_expr: "request.time"
  })
}

# Create a new meeting recording record
mutation CreateMeetingRecording($meetingId: UUID!, $streamUrl: String!, $fileSize: Int, $durationSeconds: Int) @auth(level: USER) {
  meetingRecording_insert(data: {
    meetingId: $meetingId,
    recordedById_expr: "auth.uid",
    streamUrl: $streamUrl,
    fileSize: $fileSize,
    durationSeconds: $durationSeconds
  })
}
