# JovensSTP Meeting Queries

# User related queries
query GetCurrentUser @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    id
    username
    displayName
    photoURL
    email
  }
}

# Get a single meeting by UUID
query GetMeeting($id: UUID!) @auth(level: USER, insecureReason: "Any authenticated user can join a meeting via its ID.") {
  meeting(id: $id) {
    id
    title
    description
    callId
    status
    startTime
    endTime
    host {
      id
      username
      displayName
      photoURL
    }
  }
}

# List all meetings where the user is the host or a participant
query ListUserMeetings @auth(level: USER) {
  meetings(where: { hostId: { eq_expr: "auth.uid" } }, orderBy: [{ startTime: DESC }]) {
    id
    title
    startTime
    status
    callId
  }
}

# List recordings for a specific meeting
query ListMeetingRecordings($meetingId: UUID!) @auth(level: USER, insecureReason: "Authenticated users can view recordings of the meeting.") {
  meetingRecordings(where: { meetingId: { eq: $meetingId } }, orderBy: [{ createdAt: DESC }]) {
    id
    streamUrl
    fileSize
    durationSeconds
    createdAt
  }
}
